kind = "web"
previewPath = "/"
title = "Pragyan AI"
version = "1.0.0"
id = "artifacts/pragyan-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25810

[services.development]
run = "pnpm --filter @workspace/pragyan-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pragyan-ai", "run", "build" ]
publicDir = "artifacts/pragyan-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25810"
BASE_PATH = "/"
